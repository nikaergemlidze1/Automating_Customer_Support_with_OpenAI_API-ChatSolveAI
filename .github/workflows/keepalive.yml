name: Keep-alive ping

# Pings both the Streamlit Cloud frontend and the Hugging Face Spaces
# backend every 10 minutes so the free-tier hosts don't go to sleep.
# Without this, the first visit after ~30 minutes of idle takes ~30s of
# cold-start, which is a poor first impression for recruiters / demos.

on:
  schedule:
    # every 10 minutes (cron has a minimum granularity of 5)
    - cron: "*/10 * * * *"
  workflow_dispatch:  # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit Cloud frontend
        run: |
          # -L: follow redirects, -s: silent, -o: discard body, -m: max time
          # We don't fail the workflow on a transient hiccup (|| true),
          # but we do log the HTTP code so failed pings are visible.
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -m 30 \
            "https://automatingcustomersupportwithopenaiapi-chatsolveai.streamlit.app/" || echo "000")
          echo "Streamlit Cloud → HTTP $STATUS"

      - name: Ping Hugging Face Spaces backend (/health)
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -m 30 \
            "https://Nikollass-chatsolveai-api.hf.space/health" || echo "000")
          echo "HF Space /health → HTTP $STATUS"

      - name: Warm up the RAG pipeline (one cheap query)
        run: |
          # Sending a real /chat call ensures the FAISS index, embeddings
          # client, and OpenAI client are all instantiated rather than
          # waiting for the first user query to do that work.
          curl -L -s -m 60 -X POST \
            -H "Content-Type: application/json" \
            -d '{"session_id":"keepalive-cron","query":"hello"}' \
            "https://Nikollass-chatsolveai-api.hf.space/chat" \
            -o /dev/null -w "Warm-up /chat → HTTP %{http_code}, %{time_total}s\n" || true
