name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  restart-huggingface-space:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'Nikollass/chatsolveai-api' }}
    steps:
      - name: Skip when Hugging Face token is missing
        if: ${{ env.HF_TOKEN == '' }}
        run: |
          echo "HF_TOKEN is not configured; skipping Hugging Face Space restart."

      - name: Restart Hugging Face Space
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          python -m pip install --upgrade huggingface_hub
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi(token=os.environ["HF_TOKEN"]).restart_space(
              repo_id=os.environ["HF_SPACE_ID"]
          )
          print(f"Restart requested for {os.environ['HF_SPACE_ID']}")
          PY

  streamlit-cloud:
    runs-on: ubuntu-latest
    steps:
      - name: Streamlit Cloud auto-deploy note
        run: |
          echo "Streamlit Cloud redeploys automatically from the connected GitHub main branch."
