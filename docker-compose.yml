# ── ChatSolveAI — full stack ──────────────────────────────────────────────────
#
# Services
# --------
#   mongo     → MongoDB 7 — stores sessions and query logs
#   api       → FastAPI + LangChain RAG (depends on mongo)
#   streamlit → Streamlit frontend (depends on api)
#
# Usage
# -----
#   cp .env.example .env          # add OPENAI_API_KEY
#   docker compose up --build     # first run (builds images + downloads models)
#   docker compose up -d          # subsequent runs (detached)
#
# URLs
# ----
#   Streamlit  : http://localhost:8501
#   API docs   : http://localhost:8000/docs
#   MongoDB    : mongodb://localhost:27017  (chatsolveai db)

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: chatsolveai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: chatsolveai
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatsolveai_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: chatsolveai_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      API_URL: http://api:8000   # Streamlit uses the Docker service name
    depends_on:
      api:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
